{% extends 'home.html' %}

{% block starts %}
 
    <style>
        /* this is single part of footer which is not inherited from home */
        .footer {
    background-color: #0f1d2c;
    color: white;
    padding: 20px;
    position: relative;
        }

.main-content {
    margin-bottom: 20px; /* Adjust as needed */
} 





* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
}

/* Header Styles */
header {
    background-color: #333;
    color: #fff;
    text-align: center;
    padding: 1em 0;
}

/* Main Content Styles */
main {
    max-width: 800px;
    margin: 20px auto;
}

/* Loan Form Styles */
.loan-form {
    background-color: #b0adad;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    text-align: center; /* Center the form content */
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    font-weight: bold;
}

input,
select,
textarea {
    width: 70%; /* Adjust the width as needed */
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

button {
    padding: 10px 20px;
    background-color: #015e59;
    color: #ffffffc3;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    transition: background-color 0.3s ease;
}

button:hover {
    background-color: #004d48;
}

    </style>
</head>
<body>

<header>
    <h1>Help Page / Customer Support /
        Report an Issue /
        Help Center</h1>
</header>

<section class="loan-form">
    <form method="post">
        {% csrf_token %}
            <div class="form-group">
            {{ form.email.label_tag }}
            {{ form.email }}
            </div>
            <div class="form-group">
                {{ form.issue.label_tag }}
                {{ form.issue }}
            </div>
        <button type="submit">Submit Request</button>
    </form><br>
</section>
{% endblock %}
