<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    table,th,td{
        border: 1px solid black;
    }
</style>
</head>
<body>
    <table>
        <tr>
            <th>name</th>
            <th>email</th>
            <th>image</th>
        </tr>
        {% for i in data %}

        <tr>
            <td>{{i.name}}</td>
            <td>{{i.email}}</td>
            <td><img src='{{ i.photo.url }}' width="89px" height="100px" alt=""></td>

             <td><a href="{% url 'update_student' i.id %}" class="button">Update</a></td>
        </tr>
        {% endfor %}    

    </table>
</body>
</html>
