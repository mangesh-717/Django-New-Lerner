{% extends "index.html" %}
{% block starts %}


<!-- templates/update_student.html -->
<style>
    form{margin: 55px;}
</style>
<h2>Update Student</h2>
<form method="post" autocomplete="off">
    {% csrf_token %}
    <label >Enter Email or ID:</label>
    <input type="text" name="identifier" placeholder="Enter Email or ID" required autocomplete="off"><br><br>    
    

    <label for="radio1">
        <input type="radio" id="radio1" name="radio_group" value="option1">
        id: 
    </label>
    <br>
    
    <label for="radio2">
        <input type="radio" id="radio2" name="radio_group" value="option2">
        Email:-
    </label>
    <br>

    
    <label for="new_email">New Email:</label>
    <input type="email" name="new_email" placeholder="New Email" autocomplete="off"><br><br>
    <label for="new_email">New name</label>
    <input type="text" name="new_name" placeholder="newname" autocomplete="off"><br><br>
    <label for="new_email">New last_name:</label>
    <input type="text" name="new_lastname" placeholder="newlastname" autocomplete="off"><br><br>
    <label for="new_email">New age:</label>
    <input type="text" name="new_age" placeholder="newage" ><br><br>
    <label for="new_email">New phon:</label>
    <input type="tel" name="new_phon" placeholder="newage" ><br><br>
    
    <input type="submit" value="Update Student" >
</form>












{% endblock %}
